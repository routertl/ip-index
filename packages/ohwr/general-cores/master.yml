description: "General Cores \u2014 generic FPGA primitive library. Edge detectors,\
  \ CDC synchronizers (gc_sync_*), pulse synchronizer, debouncers, Wishbone primitives\
  \ + slaves + crossbars (wb_*/xwb_*), generic memory primitives (genram_pkg single/dual-port\
  \ + async FIFO), AXI/DSP/I2C primitives, 8b/10b coder, radiation-tolerant variants.\
  \ The CERN BE-CO-HT primitive library underlying every OHWR design."
license: LGPL-2.1
license_class: unknown
