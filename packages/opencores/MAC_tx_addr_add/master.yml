role: component
contract:
  traits:
    rx_strips_fcs: false
    tx_user_frame_includes_fcs: false
    tx_hwmark_default_safe: false
    back_to_back_rx_requires_rd_pulse: true
    requires_csr_init_before_tx: true
  defects:
  - id: OC-TRIMODE-TX-HWMARK
    severity: critical
    kind: underrun-on-low-hwmark
    discovered: '2026-05-03'
    provenance: RTL-T2
    evidence: "Tx_Hwmark default 9 entries; >512 B frames hit underrun before frame\
      \ fully buffered, deliver as constant ~2,560 B GIANT wire frames regardless\
      \ of input size. VCD-confirmed (Tx_en stays HIGH continuously through full 20.4-20.5\
      \ \xB5s span) and lever-experiment-confirmed (HWM = 31 collapses 4 GIANTs to\
      \ 0)."
    recoverable: true
    workaround: CSR-write Tx_Hwmark >= 31 entries (5'h1F) before any TX traffic
    fix_pr: null
    review_after: '2026-08-03'
  - id: OC-TRIMODE-RX-WAIT-END
    severity: major
    kind: protocol-handshake-mismatch
    discovered: '2026-05-03'
    provenance: RTL-T3
    evidence: "MAC_rx_FF.v SYS_wait_end \u2192 SYS_idle requires !Rx_mac_rd; perpetual-ready\
      \ hosts (modern AXI-Stream-style ingress) wedge after frame 0 EOP and never\
      \ receive subsequent frames. VCD-confirmed (FSM transitions from SYS_read \u2192\
      \ SYS_wait_end at first EOP and never moves again across 1.4 Mns sim)."
    recoverable: true
    workaround: BFM/host pulses Rx_mac_rd low for one cycle after each EOP
    fix_pr: null
    review_after: '2026-08-03'
