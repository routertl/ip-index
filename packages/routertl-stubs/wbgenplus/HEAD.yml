description: "Empty stub for wbgenplus_pkg.  mkreider/wbgenplus's codegen emits `use\
  \ work.wbgenplus_pkg.all;` in every generated VHDL file unconditionally, but the\
  \ runtime support package the clause references was never published in any public\
  \ repo (RTL-P4.35: verified across mkreider/wbgenplus, GSI bel_projects, GSI's wr-cores\
  \ fork, mkreider/eca, gitlab.com/ohwr/project \u2014 0 hits filename-wide).  Audit\
  \ of consumers in white-rabbit/wr-eca shows zero symbol references from wbgenplus_pkg,\
  \ so an empty package suffices.  When external_uses.work.wbgenplus_pkg resolves\
  \ through the registry, this stub is the canonical provider \u2014 explicit curator\
  \ provenance, not a copy of any upstream artifact."
