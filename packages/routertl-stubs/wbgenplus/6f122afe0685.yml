  \ of consumers in white-rabbit/wr-eca shows zero symbol references from wbgenplus_pkg,\
  \ so an empty package suffices.  When external_uses.work.wbgenplus_pkg resolves\
  \ through the registry, this stub is the canonical provider \u2014 explicit curator\
  \ provenance, not a copy of any upstream artifact."
